name: lanway_client
description: "Lanway — a free, open-source VPN for the open internet"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  mobile_scanner: ^5.1.1
  app_links: ^6.1.1
  path_provider: ^2.1.3
  tray_manager: ^0.2.3
  window_manager: ^0.3.9
  connectivity_plus: ^6.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_vless: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/icon/icon_macos.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/bin/
    - assets/tray/
    - assets/images/
