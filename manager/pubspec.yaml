name: lanway_manager
description: "Lanway Manager — run and manage your own VPN server"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3
  crypto: ^3.0.3
  go_router: ^14.2.0
  qr_flutter: ^4.1.0
  share_plus: ^9.0.0
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  macos:
    generate: true
    image_path: "assets/icon/icon_macos.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/flags/
